# Default policy — permissive. Suitable for development and the headline
# credential-safety demo. Production deployments should pick one of the
# stricter policies (prod-restricted.yaml, gov-airgapped.yaml).

version: 1
metadata:
  name: default
  description: Permissive development policy.

# Tool-level rules. Match by tool name; ``default`` applies if no rule matches.
# Verdicts: allow | confirm | deny.
tools:
  default:
    decision: allow

# Egress allowlist for the credential proxy AND the browser proxy. Both
# refuse to contact any host not on this list.
http_allowlist:
  - api.local
  - shop.local

# Code patterns blocked when ``code_runner`` is invoked. The runtime never
# sees these — the policy hook short-circuits with a descriptive error so
# the agent can re-plan.
forbidden_code_patterns:
  - pattern: "import socket"
    reason: network access is forbidden in the sandbox
  - pattern: "urllib.request"
    reason: network access is forbidden in the sandbox
  - pattern: "import requests"
    reason: network access is forbidden in the sandbox
  - pattern: "subprocess"
    reason: spawning subprocesses is forbidden in the sandbox
  - pattern: "os.system"
    reason: shell escape is forbidden in the sandbox

# Per-op verdicts for the browser tool. Anything not listed inherits the
# tool-level decision for ``browser_tool`` (which falls through to
# ``default`` here = allow).
browser_ops: {}

# Selectors that are off-limits regardless of which page declared them.
# Substring match — keep it tight to avoid false positives.
browser_forbidden_selectors:
  - pattern: "card-number"
    reason: credit-card fields are off-limits to the agent
  - pattern: "cvv"
    reason: card verification fields are off-limits to the agent
  - pattern: "password"
    reason: password fields are off-limits to the agent
